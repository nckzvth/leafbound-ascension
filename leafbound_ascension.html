<body>
<main id="shell">
  <canvas id="game" aria-label="Leafbound Ascension side-scrolling action RPG"></canvas>
  <div class="loading" id="loading"><div class="loading-card"><h1>Leafbound: Ascension</h1><div class="loadbar"><i id="loadFill"></i></div><p id="loadText">Unpacking the wilds...</p></div></div>
  <div class="hud hidden" id="hud">
    <section class="player-hud pixel-panel">
      <div class="portrait"><i id="portrait"></i></div>
      <div><div class="identity"><b id="heroName">Adventurer</b><span id="heroMeta">LV. 1 NOVICE</span></div>
        <div class="meter"><b>HP</b><div class="meter-track"><i class="meter-fill hp" id="hpFill"></i></div><span id="hpText">100 / 100</span></div>
        <div class="meter"><b>MP</b><div class="meter-track"><i class="meter-fill mp" id="mpFill"></i></div><span id="mpText">40 / 40</span></div>
        <div class="meter"><b>XP</b><div class="meter-track"><i class="meter-fill xp" id="xpFill"></i></div><span id="xpText">0 / 60</span></div>
        <div class="mechanic" id="mechanicText"></div>
      </div>
